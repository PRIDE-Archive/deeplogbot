duckdb:
  memory_limit: "10GB"
  max_temp_directory_size: "10GiB"
  temp_directory: "./duckdb-tmp/"

# LLM-refined seed corrections for the deep classification pipeline
# Set to null or remove to disable LLM seed injection
llm_corrections:
  path: "data/llm_corrections.csv"
  label_column: "claude_evaluation"
  location_column: "geo_location"
  weight: 0.95

# Gold standard labels for supervised training (v9 pipeline)
gold_standard:
  path: "data/gold_standard_labels.csv"
  label_column: "label"
  location_column: "geo_location"
  split_column: "split"

# Training mode: "gold_standard" (v9) or "semi_supervised" (v8 legacy)
training_mode: "gold_standard"

# Classification rules for bot and hub detection
classification:
  # Fallback thresholds for rule-based classifier when no pattern matches
  fallback_thresholds:
    organic_max_users: 100       # Stage 1: <= this -> organic, > this -> automated
    bot_min_users: 500           # Stage 2: > this + low DL/user -> bot
    bot_max_dl_per_user: 100     # Stage 2: < this + many users -> bot
    hub_min_dl_per_user: 100     # Stage 2: >= this -> legitimate_automation

  # Hub protection rules - locations matching these are NEVER classified as bots
  hub_protection:
    # Very high downloads per user indicates institutional mirror
    high_dl_per_user:
      min_downloads_per_user: 500
      max_users: 200
    # Research institution hubs - moderate user count but very high DL/user
    # Catches universities/institutes (e.g. Ghent, Incheon, Copenhagen, Barcelona)
    # that have 200-1000 users downloading hundreds of files each over years
    research_institution:
      max_users: 1000
      min_downloads_per_user: 200
      min_years_span: 3
    # Large research hubs - many users but very high DL/user over multiple years
    # Catches large national facilities (e.g. Beijing, Tokyo, Singapore, Edinburgh)
    # Key: DL/user > 200 distinguishes from bot farms (which have 3-15 DL/user)
    large_research_hub:
      min_downloads_per_user: 200
      min_years_span: 3
    # Few users with high download activity (research labs)
    few_users_high_dl:
      max_users: 100
      min_downloads_per_user: 100
    # Single user with moderate+ activity (heavy individual use)
    single_user:
      max_users: 1
      min_downloads_per_user: 50
    # Very few users with high activity
    very_few_users:
      max_users: 10
      min_downloads_per_user: 200

  # ==========================================================================
  # HIERARCHICAL CLASSIFICATION TAXONOMY
  # ==========================================================================
  # This taxonomy classifies download behavior in two stages:
  #   Stage 1: behavior_type (ORGANIC vs AUTOMATED)
  #   Stage 2: automation_category (BOT vs LEGITIMATE_AUTOMATION) - only for AUTOMATED
  #
  # Final output: is_bot, is_hub, is_organic boolean columns.
  # ==========================================================================

  taxonomy:
    name: "pride_download_logs"
    version: "1.0"
    description: "Hierarchical classification for PRIDE database download patterns"

  # Level 1: Behavior Type Classification
  # Distinguishes human-like (organic) from programmatic (automated) behavior
  behavior_type:
    organic:
      description: "Human-like download patterns with irregular timing and working hours activity"
      patterns:
        - id: working_hours_human
          description: "Activity concentrated during working hours with irregular patterns"
          working_hours_ratio:
            min: 0.4
          regularity_score:
            max: 0.6

        - id: irregular_intervals
          description: "Highly variable download intervals (human-like)"
          interval_cv:
            min: 0.7

        - id: low_user_count_organic
          description: "Few users with moderate activity (individuals/small groups)"
          unique_users:
            max: 50
          downloads_per_user:
            min: 1
            max: 200

    automated:
      description: "Programmatic download patterns with regular timing or high coordination"
      patterns:
        - id: high_regularity
          description: "Very regular download intervals (automated scripts)"
          regularity_score:
            min: 0.7

        - id: non_working_hours
          description: "Activity outside working hours (servers/bots)"
          working_hours_ratio:
            max: 0.25
          night_activity_ratio:
            min: 0.35

        - id: high_coordination
          description: "Coordinated multi-user activity (bot farms/automation)"
          user_coordination_score:
            min: 0.6
          unique_users:
            min: 100

        - id: very_high_volume
          description: "Extremely high download volume per user (mirrors/automation)"
          downloads_per_user:
            min: 500

        - id: many_users_pattern
          description: "Many users with similar low-activity pattern (bots)"
          unique_users:
            min: 1000
          downloads_per_user:
            max: 50

  # Level 2: Automation Category Classification (only for behavior_type=AUTOMATED)
  # Distinguishes suspicious bots from legitimate automation
  automation_category:
    bot:
      description: "Suspicious or malicious automated activity"
      patterns:
        - id: many_users_low_dl
          description: "Many users with suspiciously low downloads per user (bot farm signature)"
          unique_users:
            min: 1000
          downloads_per_user:
            max: 50

        - id: coordinated_activity
          description: "Highly coordinated suspicious activity"
          user_coordination_score:
            min: 0.7
          user_authenticity_score:
            max: 0.4

        - id: ground_truth_bot
          description: "Definitive bot pattern - extremely many users with minimal activity"
          unique_users:
            min: 10000
          downloads_per_user:
            max: 10

        - id: suspicious_timing
          description: "Suspicious timing patterns outside normal hours"
          night_activity_ratio:
            min: 0.5
          unique_users:
            min: 500
          working_hours_ratio:
            max: 0.2

    legitimate_automation:
      description: "Benign automated systems (mirrors, CI/CD, institutional hubs)"
      patterns:
        - id: mirror_pattern
          description: "Institutional mirror - very high downloads per user, few users"
          downloads_per_user:
            min: 500
          unique_users:
            max: 100

        - id: high_volume_institution
          description: "Research institution hub - high volume with working hours activity"
          total_downloads:
            min: 100000
          downloads_per_user:
            min: 50
            max: 500
          working_hours_ratio:
            min: 0.25

        - id: ci_cd_pattern
          description: "CI/CD pipeline - few users, high regularity, same files"
          unique_users:
            max: 10
          regularity_score:
            min: 0.7
          downloads_per_user:
            min: 20
            max: 500

        - id: automated_sync_pattern
          description: "Automated sync/backup systems"
          unique_users:
            max: 5
          regularity_score:
            min: 0.6
          downloads_per_user:
            min: 50
